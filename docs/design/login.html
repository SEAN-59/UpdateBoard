<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — UpdateBoard Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ── */
    :root {
      --accent-h: 220; --accent-s: 65%;
      --color-accent:        hsl(var(--accent-h), var(--accent-s), 48%);
      --color-accent-hover:  hsl(var(--accent-h), var(--accent-s), 40%);
      --color-accent-light:  hsl(var(--accent-h), var(--accent-s), 94%);
      --color-accent-subtle: hsl(var(--accent-h), 30%, 97%);
      --color-accent-border: hsl(var(--accent-h), var(--accent-s), 82%);
      --color-accent-text:   hsl(var(--accent-h), var(--accent-s), 35%);

      --color-bg:            #ffffff; --color-bg-secondary: #f8f8f8; --color-bg-tertiary: #f0f0f0;
      --color-border:        #e5e5e5; --color-border-strong: #d0d0d0;
      --color-text-primary:  #111111; --color-text-secondary: #555555;
      --color-text-muted:    #999999; --color-text-disabled: #cccccc; --color-text-inverse: #ffffff;

      --color-success: hsl(142,60%,42%); --color-success-light: hsl(142,60%,95%);
      --color-warning: hsl(38,90%,48%);  --color-warning-light: hsl(38,90%,95%);
      --color-danger:  hsl(0,68%,50%);   --color-danger-light:  hsl(0,68%,95%);
      --color-info:    hsl(200,70%,44%); --color-info-light:    hsl(200,70%,95%);

      --font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-size-xs: .75rem; --font-size-sm: .875rem; --font-size-base: 1rem;
      --font-size-md: 1.125rem; --font-size-lg: 1.25rem; --font-size-xl: 1.5rem;
      --font-size-2xl: 1.875rem; --font-size-3xl: 2.25rem;
      --font-weight-light: 300; --font-weight-regular: 400; --font-weight-medium: 500;
      --font-weight-semibold: 600; --font-weight-bold: 700;
      --line-height-tight: 1.25; --line-height-normal: 1.6; --line-height-relaxed: 1.75;
      --letter-spacing-tight: -.02em; --letter-spacing-normal: 0em;
      --letter-spacing-wide: .04em; --letter-spacing-wider: .08em;

      --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
      --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem;
      --space-12:3rem; --space-16:4rem; --space-20:5rem;

      --radius-sm:4px; --radius-md:8px; --radius-lg:12px;
      --radius-xl:16px; --radius-2xl:24px; --radius-full:9999px;

      --shadow-xs: 0 1px 2px rgba(0,0,0,.05);
      --shadow-sm: 0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
      --shadow-lg: 0 8px 24px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);

      --transition-fast:80ms ease; --transition-base:150ms ease; --transition-slow:250ms ease;
    }

    /* ── Dark Mode ── */
    [data-theme="dark"] {
      --color-bg:            #111111;
      --color-bg-secondary:  #1a1a1a;
      --color-bg-tertiary:   #252525;
      --color-border:        #2e2e2e;
      --color-border-strong: #3a3a3a;
      --color-text-primary:  #f0f0f0;
      --color-text-secondary:#a0a0a0;
      --color-text-muted:    #666666;
      --color-text-disabled: #444444;
      --color-text-inverse:  #111111;
      --shadow-xs: 0 1px 2px rgba(0,0,0,.4);
      --shadow-sm: 0 1px 4px rgba(0,0,0,.5);
      --shadow-md: 0 4px 12px rgba(0,0,0,.6);
      --shadow-lg: 0 8px 24px rgba(0,0,0,.7);
    }

    /* ── Base Reset ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-family);font-size:var(--font-size-base);color:var(--color-text-primary);background:var(--color-bg);-webkit-font-smoothing:antialiased;}

    /* ── Button ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--space-2);font-family:var(--font-family);font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);line-height:1;border:1px solid transparent;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-base);text-decoration:none;white-space:nowrap;}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .btn-md{padding:calc(var(--space-2) + 2px) var(--space-4);}
    .btn-lg{padding:var(--space-3) var(--space-6);font-size:var(--font-size-md);}
    .btn-primary{background:var(--color-accent);color:#fff;border-color:var(--color-accent);}
    .btn-primary:hover:not(:disabled){background:var(--color-accent-hover);border-color:var(--color-accent-hover);}

    /* ── Input ── */
    .input{width:100%;font-family:var(--font-family);font-size:var(--font-size-sm);color:var(--color-text-primary);background:var(--color-bg);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);line-height:var(--line-height-normal);transition:border-color var(--transition-base),box-shadow var(--transition-base);outline:none;}
    .input::placeholder{color:var(--color-text-disabled);}
    .input:focus{border-color:var(--color-accent);box-shadow:0 0 0 3px var(--color-accent-light);}
    .input.is-error{border-color:var(--color-danger);}
    .input.is-error:focus{box-shadow:0 0 0 3px var(--color-danger-light);}

    /* ── Form ── */
    .form-group{margin-bottom:var(--space-5);}
    .form-label{display:block;font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);margin-bottom:var(--space-2);}
    .form-error{font-size:var(--font-size-xs);color:var(--color-danger);margin-top:var(--space-1);padding-left:var(--space-3);}

    /* ── Error Shake ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-6px); }
      30%      { transform: translateX(6px); }
      45%      { transform: translateX(-4px); }
      60%      { transform: translateX(4px); }
      75%      { transform: translateX(-2px); }
      90%      { transform: translateX(2px); }
    }
    .input.shake { animation: shake 0.45s ease; }

    /* ── Input Icon ── */
    .input-icon-wrap{position:relative;display:flex;align-items:center;}
    .input-icon{position:absolute;display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);font-size:var(--font-size-sm);}
    .input-icon-left{left:var(--space-3);}
    .input-icon-right{right:0;}
    .input-with-icon-left{padding-left:calc(var(--space-3) + 14px + var(--space-2));}
    .input-with-icon-right{padding-right:calc(var(--space-3) + 20px + var(--space-2));}
    .input-icon-btn{background:none;border:none;cursor:pointer;right:var(--space-2);padding:var(--space-1);border-radius:var(--radius-sm);transition:background var(--transition-base);}
    .input-icon-btn:hover{background:var(--color-bg-secondary);}

    /* ── Login Layout ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-secondary);
      padding: var(--space-4);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--space-10);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--color-accent);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-4);
    }

    .login-logo svg {
      width: 24px;
      height: 24px;
      color: #fff;
    }

    .login-title {
      font-size: var(--font-size-xl);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-tight);
      margin-bottom: var(--space-2);
    }

    .login-desc {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
    }

    .login-form .btn {
      width: 100%;
    }

    /* ── Toast (가이드라인) ── */
    .toast-container{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:600;display:flex;flex-direction:column;gap:var(--space-2);pointer-events:none;}
    .toast{display:flex;align-items:flex-start;gap:var(--space-3);background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);box-shadow:var(--shadow-lg);min-width:280px;max-width:360px;pointer-events:auto;animation:toastIn var(--transition-slow) ease;}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .toast.removing{animation:toastOut var(--transition-slow) ease forwards;}
    @keyframes toastOut{to{opacity:0;transform:translateX(16px);}}
    .toast-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;margin-top:1px;}
    .toast-icon.success{background:var(--color-success-light);color:var(--color-success);}
    .toast-icon.warning{background:var(--color-warning-light);color:var(--color-warning);}
    .toast-icon.danger{background:var(--color-danger-light);color:var(--color-danger);}
    .toast-icon.info{background:var(--color-info-light);color:var(--color-info);}
    .toast-content{flex:1;}
    .toast-title{font-size:var(--font-size-sm);font-weight:var(--font-weight-semibold);margin-bottom:2px;}
    .toast-msg{font-size:var(--font-size-xs);color:var(--color-text-secondary);}
    .toast-close{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:var(--color-text-muted);font-size:14px;border-radius:var(--radius-sm);flex-shrink:0;transition:all var(--transition-base);}
    .toast-close:hover{background:var(--color-bg-secondary);color:var(--color-text-primary);}

    /* ── Dark Mode Toggle ── */
    .dark-mode-toggle {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: var(--font-family);
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
      transition: all var(--transition-base);
    }
    .dark-mode-toggle:hover {
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
    }
  </style>
</head>
<body>
  <!-- Dark Mode Toggle (디자인 확인용) -->
  <button class="dark-mode-toggle" onclick="toggleDark()">
    <span class="dark-mode-icon">🌙</span>
    <span>다크모드</span>
  </button>

  <!-- Toast Container (가이드라인) -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="login-page">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h1 class="login-title">UpdateBoard</h1>
        <p class="login-desc">관리자 계정으로 로그인하세요</p>
      </div>

      <!-- Form -->
      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="adminId">아이디</label>
          <div class="input-icon-wrap">
            <span class="input-icon input-icon-left">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="adminId"
              class="input input-with-icon-left"
              placeholder="관리자 아이디를 입력하세요"
              autocomplete="username"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="adminPw">비밀번호</label>
          <div class="input-icon-wrap">
            <span class="input-icon input-icon-left">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="adminPw"
              class="input input-with-icon-left input-with-icon-right"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
            />
            <button type="button" class="input-icon input-icon-right input-icon-btn" onclick="togglePassword()" aria-label="비밀번호 보기">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
          로그인
        </button>
      </form>

    </div>
  </div>

  <script>
    /* ── Dark Mode ── */
    function toggleDark() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? '' : 'dark');
    }

    /* ── Password Toggle ── */
    function togglePassword() {
      const pw = document.getElementById('adminPw');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    /* ── Toast Helper (가이드라인 패턴) ── */
    function showToast(type, title, msg) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      const icons = { success:'✓', warning:'!', danger:'✕', info:'i' };
      toast.innerHTML = `
        <div class="toast-icon ${type}">${icons[type]}</div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-msg">${msg}</div>
        </div>
        <button class="toast-close" onclick="removeToast(this)">✕</button>
      `;
      container.appendChild(toast);
      setTimeout(() => removeToast(toast.querySelector('.toast-close')), 4000);
    }
    function removeToast(btn) {
      const t = btn.closest('.toast');
      if (!t || t.classList.contains('removing')) return;
      t.classList.add('removing');
      t.addEventListener('animationend', () => t.remove());
    }

    /* ── Login Demo ── */
    function handleLogin(e) {
      e.preventDefault();
      const id = document.getElementById('adminId');
      const pw = document.getElementById('adminPw');

      if (!id.value.trim() || !pw.value.trim()) {
        const firstEmpty = !id.value.trim() ? id : pw;
        firstEmpty.classList.add('is-error', 'shake');
        firstEmpty.focus();
        setTimeout(() => firstEmpty.classList.remove('shake'), 450);
        showToast('danger', '입력 오류', '아이디와 비밀번호를 모두 입력해주세요.');
        return;
      }

      // Demo: 아이디 admin / 비밀번호 admin 으로 성공 시뮬레이션
      if (id.value === 'admin' && pw.value === 'admin') {
        id.classList.remove('is-error');
        pw.classList.remove('is-error');
        showToast('success', '로그인 성공', '대시보드로 이동합니다.');
      } else {
        id.classList.add('is-error', 'shake');
        pw.classList.add('is-error', 'shake');
        setTimeout(() => {
          id.classList.remove('shake');
          pw.classList.remove('shake');
        }, 450);
        showToast('danger', '로그인 실패', '아이디 또는 비밀번호가 올바르지 않습니다.');
      }
    }

    /* ── Clear error on input ── */
    document.getElementById('adminId').addEventListener('input', function() { this.classList.remove('is-error'); });
    document.getElementById('adminPw').addEventListener('input', function() { this.classList.remove('is-error'); });
  </script>
</body>
</html>
